name: Dotnet Installer

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-installer.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-installer.yml"

jobs:
  build-installers:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\dotnet\NeoOptimize.slnx

      - name: Build
        run: dotnet build .\dotnet\NeoOptimize.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test .\dotnet\NeoOptimize.slnx --configuration Release --no-build

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool update --global wix --version 4.* | Out-Null
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global wix --version 4.* | Out-Null
          }
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install WiX UI extension
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          $extensions = wix extension list | Out-String
          if ($extensions -match "WixToolset.UI.wixext" -and $extensions -match "\(damaged\)") {
            wix extension remove --global WixToolset.UI.wixext | Out-Null
            $extensions = wix extension list | Out-String
          }
          if ($extensions -notmatch "WixToolset.UI.wixext") {
            wix extension add --global WixToolset.UI.wixext/4.0.6
          }

      - name: Seed optional AI runtime directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\dotnet\runtime\ai | Out-Null
          Set-Content -Path .\dotnet\runtime\ai\README.txt -Value "Replace with actual offline AI runtime/model files for release packaging." -Encoding UTF8

      - name: Build Core and Core+AI installers
        shell: pwsh
        run: |
          .\dotnet\scripts\package-installers.ps1 -Variant both -ProductVersion 1.0.0

      - name: Require signing secrets for tag releases
        if: startsWith(github.ref, 'refs/tags/v') && (secrets.WIN_SIGN_CERT_BASE64 == '' || secrets.WIN_SIGN_CERT_PASSWORD == '')
        shell: pwsh
        run: |
          Write-Error "Tag release build requires WIN_SIGN_CERT_BASE64 and WIN_SIGN_CERT_PASSWORD secrets."
          exit 1

      - name: Sign publish exe and installers
        if: secrets.WIN_SIGN_CERT_BASE64 != '' && secrets.WIN_SIGN_CERT_PASSWORD != ''
        shell: pwsh
        env:
          WIN_SIGN_CERT_BASE64: ${{ secrets.WIN_SIGN_CERT_BASE64 }}
          WIN_SIGN_CERT_PASSWORD: ${{ secrets.WIN_SIGN_CERT_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "neooptimize-release-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WIN_SIGN_CERT_BASE64))
          .\dotnet\scripts\sign-release.ps1 `
            -CertificatePfxPath $pfxPath `
            -CertificatePassword $env:WIN_SIGN_CERT_PASSWORD

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neooptimize-msi
          path: dotnet/out/installers/*.msi
          if-no-files-found: error

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: neooptimize-publish
          path: dotnet/out/publish/**
          if-no-files-found: error

