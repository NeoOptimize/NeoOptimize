# OpenFang AI Configuration for NeoOptimize + Security Onion
# Place this file in your OpenFang configuration directory

[agents.guardian]
name = "Guardian_Neo"
description = "Aegis AV L0-L5 Threat Analyzer & Security Onion Orchestrator"
model = "claude-3-5-sonnet-20240620" # Configure your LLM Provider here
schedule = "every 15 seconds"
skills = ["aegis_threat_analysis", "neo_quarantine_action"]

[agents.optimizer]
name = "Optimizer_Neo"
description = "System Performance & Health Analyzer"
model = "claude-3-5-sonnet-20240620"
schedule = "every 5 minutes"
skills = ["neo_performance_tuning"]

[agents.auditor]
name = "Auditor_Neo"
description = "Compliance and Audit Log Analyzer"
model = "claude-3-haiku-20240307"
schedule = "every 1 hour"
skills = ["neo_audit_analysis"]

[agents.predictor]
name = "Predictor_Neo"
description = "Anomaly and Zero-Day Prediction Engine"
model = "claude-3-5-sonnet-20240620"
schedule = "every 24 hours"
skills = ["neo_anomaly_forecasting"]
