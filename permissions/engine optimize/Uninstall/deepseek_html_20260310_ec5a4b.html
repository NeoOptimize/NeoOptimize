<!-- Tambahkan di dalam body, setelah app-container atau sebelum penutup body -->
<div class="tray-icon" id="trayIcon">
    <i class="fas fa-robot"></i>
</div>

<style>
.tray-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 15px var(--accent-glow);
    z-index: 9999;
    transition: transform 0.2s;
}

.tray-icon:hover {
    transform: scale(1.1);
}

.tray-icon.notification {
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    70% { box-shadow: 0 0 0 15px rgba(107,140,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(107,140,255,0); }
}
</style>

<script>
// Animasi untuk tray icon
const trayIcon = document.getElementById('trayIcon');

// Fungsi untuk memberi notifikasi (misal saat ada rekomendasi)
function notifyTray() {
    trayIcon.classList.add('notification');
    // Putar ikon
    anime({
        targets: trayIcon,
        rotate: '1turn',
        duration: 1000,
        easing: 'easeInOutQuad'
    });
    setTimeout(() => {
        trayIcon.classList.remove('notification');
    }, 3000);
}

// Contoh: panggil notifyTray() saat ada rekomendasi (mode manual)
setInterval(() => {
    if (currentMode === 'manual') {
        notifyTray();
    }
}, 10000); // setiap 10 detik sebagai simulasi

// Klik tray icon untuk membuka dashboard (scroll ke atas dan buka sidebar jika tertutup)
trayIcon.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    if (sidebar.classList.contains('collapsed')) {
        sidebar.classList.remove('collapsed');
    }
    // Buka halaman dashboard
    document.querySelector('[data-page="dashboard"]').click();
});
</script>
