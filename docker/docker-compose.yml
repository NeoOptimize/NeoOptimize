# ═══════════════════════════════════════════════════════════════════
# NeoOptimize RMM v6.0 — Docker Compose (Production)
# Usage:
#   docker compose up -d               # Start all services
#   docker compose logs -f server      # Watch server logs
#   docker compose exec server npm run keygen  # Generate RSA keys
# ═══════════════════════════════════════════════════════════════════

version: '3.9'

networks:
  neo-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data:
  redis_data:
  keys_data:

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: neo-postgres
    restart: unless-stopped
    networks: [neo-internal]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-neooptimize_rmm}
      POSTGRES_USER:     ${POSTGRES_USER:-neo_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Bind to localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neo_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neo-redis
    restart: unless-stopped
    networks: [neo-internal]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # Bind to localhost only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── NeoOptimize RMM Server ──────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neo-server
    restart: unless-stopped
    networks: [neo-internal]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               3000
      HOST:               0.0.0.0
      POSTGRES_HOST:      postgres
      POSTGRES_PORT:      5432
      POSTGRES_DB:        ${POSTGRES_DB:-neooptimize_rmm}
      POSTGRES_USER:      ${POSTGRES_USER:-neo_app}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
      REDIS_URL:          redis://redis:6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-8h}
      SIGNING_KEY_PASSPHRASE: ${SIGNING_KEY_PASSPHRASE}
      DASHBOARD_ORIGIN:   ${DASHBOARD_ORIGIN}
      DUCKDNS_TOKEN:      ${DUCKDNS_TOKEN}
      DUCKDNS_DOMAIN:     ${DUCKDNS_DOMAIN}
      OPENFANG_API_KEY:   ${OPENFANG_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID:   ${TELEGRAM_CHAT_ID}
      SUPABASE_URL:       ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      HF_TOKEN:           ${HF_TOKEN}
      HF_SPACE_ID:        ${HF_SPACE_ID}
      NULLCLAW_API_KEY:   ${NULLCLAW_API_KEY}
      NULLCLAW_URL:       ${NULLCLAW_URL}
      E2B_API_KEY:        ${E2B_API_KEY}
      OLLAMA_URL:         ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL:       ${OLLAMA_MODEL:-llama3}
      KEY_DIR:            /run/secrets/keys
      RATE_LIMIT_MAX:     ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      AGENT_OFFLINE_THRESHOLD: ${AGENT_OFFLINE_THRESHOLD:-2}
      WS_HEARTBEAT_INTERVAL: ${WS_HEARTBEAT_INTERVAL:-25000}
    volumes:
      - keys_data:/run/secrets/keys
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Access host Ollama
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options: { max-size: "50m", max-file: "5" }

  # ─── Dashboard (Nginx + Vite Build) ─────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: neo-dashboard
    restart: unless-stopped
    networks: [neo-internal]
    depends_on: [server]
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  # ─── Ollama Local AI (optional — remove if running on host) ──────
  ollama:
    image: ollama/ollama:latest
    container_name: neo-ollama
    restart: unless-stopped
    networks: [neo-internal]
    profiles: ["ollama"]  # Only starts with: docker compose --profile ollama up
    volumes:
      - ~/.ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
