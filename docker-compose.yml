version: '3.8'

services:
  backend:
    build: .
    ports:
      - "7860:7860"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - CLIENT_API_KEY=${CLIENT_API_KEY}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped